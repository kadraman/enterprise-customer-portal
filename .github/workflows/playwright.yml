name: Playwright Tests
on:
#  push:
#    branches: [ main, master ]
#  pull_request:
#    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Ensure Gradle wrapper is executable
      run: chmod +x gradlew

    - name: Build Spring Boot jar with embedded frontend
      run: ./gradlew clean bootJar

    - name: Start Spring Boot app
      run: |
        APP_JAR=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)
        if [ -z "$APP_JAR" ]; then
          echo "No runnable Spring Boot jar found in build/libs"
          ls -la build/libs || true
          exit 1
        fi
        nohup java -jar "$APP_JAR" > app.log 2>&1 &
        echo $! > /tmp/app.pid

    - name: Wait for app to be ready on port 8080
      run: |
        for i in {1..90}; do
          if curl -fsS http://localhost:8080 >/dev/null; then
            echo "Application is ready"
            exit 0
          fi
          echo "Waiting for application startup..."
          sleep 2
        done
        echo "Application failed to start in time"
        tail -n 200 app.log || true
        exit 1

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: frontend

    - name: Run Playwright tests
      run: npx playwright test
      working-directory: frontend
      env:
        E2E_BASE_URL: http://localhost:8080

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: workflow-har
        path: etc/FortifyDemoApp-Dev-Workflow.har
        retention-days: 30

    # to use the artifacts in a later workflow, you can download them with the download-artifact action:
    # - uses: actions/download-artifact@v4
    #   - name: workflow-har
    
    - name: Stop Spring Boot app
      if: always()
      run: |
        if [ -f /tmp/app.pid ]; then
          kill $(cat /tmp/app.pid) || true
        fi
        tail -n 200 app.log || true
