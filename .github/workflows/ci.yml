name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main, feature/**, bugfix/** ]
    paths:
      - '**'
      - '!.github/workflows/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**'
      - '!.github/workflows/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew || true

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Build (assemble, skip tests)
        run: ./gradlew clean build -x test --no-daemon

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        if: ${{ github.event_name != 'pull_request' }}
        id: meta
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/enterprise-customer-portal:latest
            ghcr.io/${{ github.repository_owner }}/enterprise-customer-portal:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
            ENTRA_CLIENT_ID=${{ vars.ENTRA_CLIENT_ID }}
            ENTRA_TENANT_ID=${{ vars.ENTRA_TENANT_ID }}
            ENTRA_AUTHORITY=${{ vars.ENTRA_AUTHORITY }}
            ENTRA_API_SCOPES=${{ vars.ENTRA_API_SCOPES }}
            ENTRA_API_REDIRECT_URI=${{ vars.ENTRA_API_REDIRECT_URI }}
            ENTRA_POPUP_REDIRECT_URI=${{ vars.ENTRA_POPUP_REDIRECT_URI }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
            org.opencontainers.image.authors=OpenText AppSec Demo
