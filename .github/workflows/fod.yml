# Create GitHub Action Repository Variables for your version of the application:
#   FOD_URL                     - FoD Portal URL for your tenant (e.g. https://ams.fortify.com)
#   FOD_DEFAULT_OWNER           - The user id of the Application Owner (only needed if an application does not already exist)
#   FOD_DEFAULT_ASSESSMENT_TYPE - The default Assessment Type to use, e.g. "Static Assessment"
# Create GitHub Action Secrets for your version of the application:
#   FOD_CLIENT_ID should be an API Key obtained from your FoD tenant.
#   FOD_CLIENT_SECRET should be the secret for the API Key obtained for your FoD tenant.
# Helpful hints:
#   API Key credentials can be obtained from your FoD tenant, under Administration -> Settings -> API
#   It is recommended to create credentials with 'Security Lead' Role selected.
#   "Automated Audit preference" should be configured for the release's Static Scan Settings.
name: FoD SAST Scan

# Set the permissions for the GITHUB_TOKEN to allow the workflow to read repository contents, write security events, and write pull request comments. This is necessary for the workflow to function properly, as it needs to access the codebase for scanning, report security findings, and comment on pull requests with the results.
permissions:
  contents: read
  security-events: write
  pull-requests: write

on:
  push:
    branches: [ main, feature/**, bugfix/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Global environment variables
env:
  DEFAULT_APP_NAME: "Enterprise Customer Portal"
  DEFAULT_PARENT_RELEASE_NAME: "main"
  JAVA_VERSION: "17"

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      FOD_BACKEND_RELEASE: ${{ steps.commands.outputs.FOD_BACKEND_RELEASE }}
      FOD_BACKEND_PARENT_RELEASE: ${{ steps.commands.outputs.FOD_BACKEND_PARENT_RELEASE }}
      FOD_FRONTEND_RELEASE: ${{ steps.commands.outputs.FOD_FRONTEND_RELEASE }}
      FOD_FRONTEND_PARENT_RELEASE: ${{ steps.commands.outputs.FOD_FRONTEND_PARENT_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up environment variables
        id: commands
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running in a pull request pipeline ..."
            BACKEND_RELEASE="${{ env.DEFAULT_APP_NAME }}:merge-to-${{ github.base_ref }}#PR${{ github.event.number }}-backend"
            BACKEND_PARENT_RELEASE="${{ env.DEFAULT_APP_NAME }}:${{ github.head_ref }}-backend"
            FRONTEND_RELEASE="${{ env.DEFAULT_APP_NAME }}:merge-to-${{ github.base_ref }}#PR${{ github.event.number }}-frontend"
            FRONTEND_PARENT_RELEASE="${{ env.DEFAULT_APP_NAME }}:${{ github.head_ref }}-frontend"
          else
            echo "Running in a branch pipeline ..."
            BACKEND_RELEASE="${{ env.DEFAULT_APP_NAME }}:${{ github.ref_name }}-backend"
            BACKEND_PARENT_RELEASE="${{ env.DEFAULT_APP_NAME }}:${{ env.DEFAULT_PARENT_RELEASE_NAME }}-backend"
            FRONTEND_RELEASE="${{ env.DEFAULT_APP_NAME }}:${{ github.ref_name }}-frontend"
            FRONTEND_PARENT_RELEASE="${{ env.DEFAULT_APP_NAME }}:${{ env.DEFAULT_PARENT_RELEASE_NAME }}-frontend"
          fi 
          echo "FOD_BACKEND_RELEASE=${BACKEND_RELEASE}" >> $GITHUB_OUTPUT
          echo "FOD_BACKEND_PARENT_RELEASE=${BACKEND_PARENT_RELEASE}" >> $GITHUB_OUTPUT
          echo "FOD_FRONTEND_RELEASE=${FRONTEND_RELEASE}" >> $GITHUB_OUTPUT
          echo "FOD_FRONTEND_PARENT_RELEASE=${FRONTEND_PARENT_RELEASE}" >> $GITHUB_OUTPUT

  fortify-backend-scan:
    runs-on: ubuntu-latest
    needs: [ Prepare ]
    env: 
      FOD_RELEASE: ${{ needs.Prepare.outputs.FOD_BACKEND_RELEASE }}
      FOD_PARENT_RELEASE: ${{ needs.Prepare.outputs.FOD_BACKEND_PARENT_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties','**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew || true
      #
      # See: https://fortify.github.io/fcli/v3/ci/github/v3.0.x/ast-action-fod.html
      #
      - name: Run FoD backend SAST Scan
        timeout-minutes: 360
        uses: fortify/github-action@v3
        env:
          FOD_URL: ${{ vars.FOD_URL }}
          FOD_CLIENT_ID: ${{secrets.FOD_CLIENT_ID}}
          FOD_CLIENT_SECRET: ${{secrets.FOD_CLIENT_SECRET}}
          SETUP_EXTRA_OPTS: ${{ format('--sdlc-status Development --app-owner {0}', vars.FOD_DEFAULT_OWNER) }}
          PACKAGE_EXTRA_OPTS: -bt gradle -bf build.gradle -bc "clean build -x test"
          COPY_FROM_RELEASE: ${{ env.FOD_PARENT_RELEASE }}
          SAST_ASSESSMENT_TYPE: ${{ vars.FOD_DEFAULT_ASSESSMENT_TYPE }}
          SAST_WAIT_EXTRA_OPTS: --timeout 3h
          DO_SETUP: true
          DO_SAST_SCAN: true
          DO_AVIATOR_AUDIT: true
          DO_SCA_SCAN: false
          DO_WAIT: true
          DO_CHECK_POLICY: true
          DO_RELEASE_SUMMARY: true
          DO_PR_COMMENT: true
          DO_SAST_EXPORT: true

  fortify-frontend-scan:
    runs-on: ubuntu-latest
    needs: [ Prepare ]
    env:
      FOD_RELEASE: ${{ needs.Prepare.outputs.FOD_FRONTEND_RELEASE }}
      FOD_PARENT_RELEASE: ${{ needs.Prepare.outputs.FOD_FRONTEND_PARENT_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      #
      # See: https://fortify.github.io/fcli/v3/ci/github/v3.0.x/ast-action-fod.html
      #
      - name: Run FoD frontend SAST Scan
        timeout-minutes: 360
        uses: fortify/github-action@v3
        env:
          FOD_URL: ${{ vars.FOD_URL }}
          FOD_CLIENT_ID: ${{secrets.FOD_CLIENT_ID}}
          FOD_CLIENT_SECRET: ${{secrets.FOD_CLIENT_SECRET}}
          SETUP_EXTRA_OPTS: ${{ format('--sdlc-status Development --app-owner {0}', vars.FOD_DEFAULT_OWNER) }}
          BASE_DIR: ./frontend
          PACKAGE_EXTRA_OPTS: -bt npm -bf package.json -bc "npm run build"
          COPY_FROM_RELEASE: ${{ env.FOD_PARENT_RELEASE }}
          SAST_ASSESSMENT_TYPE: ${{ vars.FOD_DEFAULT_ASSESSMENT_TYPE }}
          SAST_WAIT_EXTRA_OPTS: --timeout 3h
          DO_SETUP: true
          DO_SAST_SCAN: true
          DO_AVIATOR_AUDIT: true
          DO_SCA_SCAN: false
          DO_WAIT: true
          DO_CHECK_POLICY: true
          DO_RELEASE_SUMMARY: true
          DO_PR_COMMENT: true
          DO_SAST_EXPORT: true
