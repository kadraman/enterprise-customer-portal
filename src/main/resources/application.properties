# Application Configuration
spring.application.name=enterprise-customer-portal
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
# Hardcoded credentials - security vulnerability
spring.datasource.username=admin
spring.datasource.password=P@ssw0rd123!

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Enable ANSI colors in logs (optional, for better readability in supported terminals)
spring.output.ansi.enabled=detect

# Logging
logging.level.root=INFO
logging.level.com.opentext.appsec.demo.app=DEBUG

# Security vulnerabilities in configuration (intentional for demo)
# API Keys hardcoded - DO NOT DO THIS IN PRODUCTION
api.secret.key=demo_secret_key_abc123_INTENTIONALLY_INSECURE
api.demo.key=demo_api_key_xyz789_THIS_IS_A_VULNERABILITY
jwt.secret=mySecretKeyIsNotSecureAtAll123456

# Use the legacy Ant path matcher so controller regex+** patterns work
# Some SPA forward patterns require Ant-style matching; keep for compatibility
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# INSECURE (intentional): Exposes all Spring Boot Actuator endpoints (including sensitive endpoints).
# Secure alternative: restrict exposure to specific endpoints (for example: management.endpoints.web.exposure.include=health,info)
# Secure alternative: protect actuator endpoints with authentication/authorization (for example via Spring Security).
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# Microsoft Entra ID / OAuth2 Configuration (optional)
# IMPORTANT: Set these properties only if you want to enable Entra token validation
# Get these values from Azure Portal > App registrations > Your backend app
# Set ENTRA_TENANT_ID in the container environment (for example via docker compose --env-file)
# to inject the tenant id at runtime.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/${ENTRA_TENANT_ID:unknown}/v2.0
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://login.microsoftonline.com/${ENTRA_TENANT_ID:unknown}/discovery/v2.0/keys
